<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VariantGPT</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header>
  <h1>Variant<span class="accent">GPT</span></h1>
  <div class="legend">
    <span class="chip ok">certain</span>
    <span class="chip warn">wobbly</span>
    <span class="chip bad">shaky</span>
  </div>
  <label class="slider" title="How many of the least-certain words to highlight">
    highlight <b id="threshVal">3</b>
    <input id="thresh" type="range" min="0" max="20" value="3" />
    words
  </label>
  <button id="reset" title="New chat">new chat</button>
</header>
<main id="chat"></main>
<footer>
  <div class="hint">click a colored word to see alternatives &amp; branch</div>
  <div class="inputrow">
    <input id="input" type="text" placeholder="Say something…" autocomplete="off" />
    <button id="send">send</button>
  </div>
</footer>
<div id="popover" class="hidden"></div>
<script src="/app.js"></script>
</body>
</html>
